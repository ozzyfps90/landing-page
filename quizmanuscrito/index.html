<style>
/* ── Reset & Variables ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:       #082B49;
  --blue-cta:   #169FEA;
  --light-blue: #DDF4FF;
  --blue-border:#BDEAFF;
  --gold:       #D8A63A;
  --green-cta:  #20B455;
}

/* ── Body / Background ─────────────────────────────────────────── */
body {
  font-family: 'Nunito', system-ui, sans-serif;
  background: linear-gradient(160deg, #eaf8ff 0%, #f7fcff 45%, #ddf4ff 100%);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px 16px 56px;
  -webkit-font-smoothing: antialiased;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 480px; height: 480px;
  background: radial-gradient(ellipse, rgba(22,159,234,.10) 0%, transparent 70%);
  pointer-events: none;
}

/* ── Wrapper ───────────────────────────────────────────────────── */
#wrapper { width: 100%; max-width: 400px; position: relative; }

/* ── Progress Bar ──────────────────────────────────────────────── */
.progress-wrap { margin-bottom: 10px; }
.progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.progress-label { font-size: 12px; font-weight: 600; color: rgba(8,43,73,.5); }
.progress-pct   { font-size: 12px; font-weight: 800; color: var(--blue-cta); }
.progress-track { height: 8px; background: var(--light-blue); border-radius: 999px; overflow: hidden; }
.progress-fill  { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #169FEA, #0D7DC2); transition: width .7s ease; }

/* ── Clarity Meter ─────────────────────────────────────────────── */
.clarity-wrap {
  background: rgba(255,255,255,.88); border: 1px solid var(--blue-border);
  border-radius: 16px; padding: 12px 16px; margin-bottom: 10px;
}
.clarity-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.clarity-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: rgba(8,43,73,.6); }
.clarity-star  { color: var(--gold); margin-right: 5px; }
.clarity-pct   { font-size: 14px; font-weight: 900; color: var(--gold); }
.clarity-track { height: 10px; background: #f0f0f0; border-radius: 999px; overflow: visible; position: relative; }
.clarity-fill  {
  height: 100%; border-radius: 999px; position: relative;
  background: linear-gradient(90deg, #9e6500, #d8a63a, #f5dc8a, #d8a63a);
  transition: width 1s ease;
}
.clarity-dot {
  position: absolute; right: -5px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; border-radius: 50%; background: var(--gold);
  border: 2px solid #fff;
  box-shadow: 0 0 8px 3px rgba(216,166,58,.55);
  animation: pulseGold 2.5s ease-in-out infinite;
}

/* ── Top Nav Row ───────────────────────────────────────────────── */
.nav-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.nav-row .progress-wrap { flex: 1; margin-bottom: 0; }
.back-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--blue-border);
  background: #fff; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: rgba(8,43,73,.4); flex-shrink: 0; transition: all .2s;
}
.back-btn:hover { border-color: var(--blue-cta); color: var(--blue-cta); }
.back-btn svg { width: 14px; height: 14px; }

/* ── Card ──────────────────────────────────────────────────────── */
.card {
  background: rgba(255,255,255,.97);
  border: 1px solid var(--blue-border);
  border-radius: 24px;
  box-shadow: 0 8px 40px rgba(22,159,234,.14), 0 2px 8px rgba(8,43,73,.07);
  overflow: hidden;
}

/* ── Step Content animation ────────────────────────────────────── */
.step-content { animation: fadeInUp .38s ease both; }
.step-content.exiting { animation: fadeOutUp .25s ease both; }
@keyframes fadeInUp   { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOutUp  { from { opacity: 1; transform: translateY(0);    } to { opacity: 0; transform: translateY(-16px); } }

/* ── Step inner padding ────────────────────────────────────────── */
.step-inner { padding: 24px; display: flex; flex-direction: column; gap: 18px; }

/* ── Badge ─────────────────────────────────────────────────────── */
.badge-wrap { text-align: center; }
.badge {
  display: inline-block;
  font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em;
  color: var(--blue-cta); background: var(--light-blue); border: 1px solid var(--blue-border);
  border-radius: 999px; padding: 6px 16px;
}

/* ── Headlines ─────────────────────────────────────────────────── */
.headline {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.85rem; font-weight: 700; line-height: 1.2;
  color: var(--navy); text-align: center;
}
.headline-lg { font-size: 2rem; }
.subtext { font-size: 14px; color: rgba(8,43,73,.68); line-height: 1.65; text-align: center; }
.subtext-italic { font-style: italic; font-size: 13px; color: rgba(8,43,73,.48); text-align: center; }

/* ── Hero Visual ───────────────────────────────────────────────── */
.hero-visual {
  position: relative; width: 100%; height: 200px; border-radius: 16px; overflow: hidden;
  background: linear-gradient(170deg, #0f2a44 0%, #082B49 55%, #0d4c7a 100%);
}
.hero-glow {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 20%, rgba(216,166,58,.45) 0%, transparent 65%);
}
.hero-ray {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 2px; height: 100%;
  background: linear-gradient(to bottom, rgba(245,220,138,.7), transparent);
  animation: lightRay 3.5s ease-in-out infinite;
}
.hero-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
.hero-emoji  { font-size: 3.5rem; animation: float 4s ease-in-out infinite; }
.hero-quote  { font-family: 'Cormorant Garamond', serif; font-style: italic; color: rgba(216,166,58,.8); font-size: 13px; text-align: center; padding: 0 16px; }

/* ── Chip ──────────────────────────────────────────────────────── */
.chip-wrap { display: flex; justify-content: center; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 700; color: var(--blue-cta);
  background: var(--light-blue); border: 1px solid var(--blue-border);
  border-radius: 999px; padding: 8px 16px;
}

/* ── CTA Button ────────────────────────────────────────────────── */
.btn-primary {
  display: block; width: 100%; padding: 16px 20px;
  border: none; border-radius: 16px; cursor: pointer;
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 900;
  text-transform: uppercase; letter-spacing: .1em; color: #fff;
  background: linear-gradient(135deg, #169FEA, #0D7DC2);
  box-shadow: 0 8px 24px rgba(22,159,234,.38);
  transition: all .2s; line-height: 1;
}
.btn-primary:hover   { filter: brightness(1.08); }
.btn-primary:active  { transform: scale(.97); }
.btn-green {
  background: linear-gradient(135deg, #20B455, #169A47);
  box-shadow: 0 10px 28px rgba(32,180,85,.38);
}
.btn-ghost {
  background: none; border: none; cursor: pointer; width: 100%; padding: 8px;
  font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 600;
  color: rgba(8,43,73,.38); text-decoration: underline; text-underline-offset: 3px;
  transition: color .2s;
}
.btn-ghost:hover { color: rgba(8,43,73,.6); }

/* ── Option Button ─────────────────────────────────────────────── */
.option-btn {
  width: 100%; text-align: left; padding: 14px 16px;
  border: 2px solid var(--blue-border); border-radius: 16px;
  background: #fff; cursor: pointer; transition: all .18s;
  font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600;
  color: var(--navy); display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.option-btn:hover    { border-color: rgba(22,159,234,.5); background: rgba(221,244,255,.35); }
.option-btn:active   { transform: scale(.98); }
.option-btn.selected { border-color: var(--blue-cta); background: rgba(221,244,255,.6); box-shadow: 0 0 0 3px rgba(22,159,234,.18); }
.option-left  { display: flex; align-items: center; gap: 10px; }
.option-emoji { font-size: 18px; line-height: 1; }
.option-check {
  width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--blue-border);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all .18s;
}
.option-btn.selected .option-check {
  border-color: var(--blue-cta); background: var(--blue-cta);
}
.option-check svg { display: none; }
.option-btn.selected .option-check svg { display: block; }
.options-list { display: flex; flex-direction: column; gap: 10px; }

/* ── Text Input ────────────────────────────────────────────────── */
.input-label { font-size: 13px; font-weight: 700; color: rgba(8,43,73,.6); margin-bottom: 6px; display: block; }
.text-input {
  width: 100%; padding: 16px; border-radius: 16px; border: 2px solid var(--blue-border);
  font-family: 'Nunito', sans-serif; font-size: 16px; color: var(--navy);
  background: #fff; outline: none; transition: border-color .2s, box-shadow .2s;
}
.text-input::placeholder { color: rgba(8,43,73,.28); }
.text-input:focus { border-color: var(--blue-cta); box-shadow: 0 4px 20px rgba(22,159,234,.15); }
.input-error { font-size: 12px; color: #e53e3e; margin-top: 4px; }

/* ── Feedback message ──────────────────────────────────────────── */
.feedback { text-align: center; font-size: 13px; font-weight: 700; color: var(--green-cta); min-height: 20px; animation: fadeInUp .4s ease both; }

/* ── Divider ───────────────────────────────────────────────────── */
.divider { display: flex; align-items: center; gap: 12px; }
.divider-line { flex: 1; height: 1px; background: var(--blue-border); }
.divider-star { color: var(--gold); font-size: 18px; }

/* ── Info Box ──────────────────────────────────────────────────── */
.info-box {
  background: linear-gradient(135deg, rgba(221,244,255,.7), rgba(189,234,255,.4));
  border: 1px solid var(--blue-border); border-radius: 16px; padding: 18px;
}
.info-box-gold { background: rgba(216,166,58,.06); border-color: rgba(216,166,58,.28); }

/* ── Testimonial ───────────────────────────────────────────────── */
.testimonial {
  background: rgba(221,244,255,.45); border: 1px solid var(--blue-border);
  border-radius: 16px; padding: 14px;
}
.testimonial-inner { display: flex; align-items: flex-start; gap: 10px; }
.t-avatar {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, #169FEA, #082B49);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 20px; color: #fff;
}
.t-name  { font-size: 12px; font-weight: 800; color: rgba(8,43,73,.7); margin-bottom: 5px; }
.t-text  { font-size: 13px; color: rgba(8,43,73,.8); line-height: 1.6; font-style: italic; }
.t-stars { display: flex; gap: 2px; margin-top: 6px; }
.t-stars span { color: var(--gold); font-size: 11px; }
.testimonials-list { display: flex; flex-direction: column; gap: 10px; }

/* ── Loading Step ──────────────────────────────────────────────── */
.loading-visual {
  position: relative; width: 176px; height: 176px; border-radius: 16px; overflow: hidden;
  margin: 0 auto;
  background: linear-gradient(160deg, #0f2d4a 0%, #082B49 55%, #0d4c7a 100%);
}
.loading-glow { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 25%, rgba(216,166,58,.45) 0%, transparent 65%); }
.loading-ray  { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 1px; height: 100%; background: linear-gradient(to bottom, rgba(245,220,138,.7), transparent); animation: lightRay 3.5s ease-in-out infinite; }
.loading-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
.loading-emoji  { font-size: 3rem; animation: float 4s ease-in-out infinite; }
.loading-sub    { font-family: 'Cormorant Garamond', serif; font-style: italic; color: rgba(216,166,58,.7); font-size: 11px; }
.loading-pct   { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; color: var(--blue-cta); text-align: center; }
.loading-track { height: 10px; background: var(--light-blue); border-radius: 999px; overflow: hidden; }
.loading-fill  { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #9e6500, #d8a63a, #f5dc8a); transition: width .3s ease; }
.loading-phrase { font-size: 13px; font-weight: 700; color: var(--blue-cta); text-align: center; min-height: 20px; animation: fadeInUp .4s ease both; }
.loading-name   { font-size: 11px; color: rgba(8,43,73,.45); font-style: italic; text-align: center; }

/* ── Video Mock ────────────────────────────────────────────────── */
/* ── VSL hint & CTA ────────────────────────────────────────────── */
.vsl-hint {
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, #082B49, #0d4c7a);
  border-radius: 12px; padding: 12px 16px;
  color: #fff; font-size: 13px; font-weight: 600; line-height: 1.4;
  border: 1px solid rgba(22,159,234,.35);
}
.vsl-hint-icon {
  flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%;
  background: var(--blue-cta); display: flex; align-items: center;
  justify-content: center; font-size: 13px;
  animation: bonusPulse 2s ease-in-out infinite;
}
.vsl-cta-btn {
  margin-top: 8px; font-size: 15px !important;
  padding: 18px 20px !important; width: 100%;
}

/* ── YouTube VSL embed ─────────────────────────────────────────── */
.yt-wrap {
  position: relative; width: 100%; border-radius: 16px; overflow: hidden;
  aspect-ratio: 16/9;
  background: #000;
  box-shadow: 0 8px 32px rgba(8,43,73,.28);
}
.yt-wrap iframe {
  position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: block;
}
.video-helper { font-size: 11px; color: rgba(8,43,73,.45); text-align: center; margin-top: 8px; }

/* ── Offer ─────────────────────────────────────────────────────── */
.offer-person-box {
  border-radius: 16px; padding: 16px;
  background: linear-gradient(140deg, #082B49, #0d4c7a);
  display: flex; flex-direction: column; gap: 8px;
}
.offer-person-row { display: flex; align-items: flex-start; gap: 8px; }
.offer-person-star { color: var(--gold); font-size: 12px; margin-top: 2px; flex-shrink: 0; }
.offer-person-text { font-size: 13px; color: rgba(255,255,255,.9); }
.offer-person-text span { color: rgba(255,255,255,.55); }
.offer-person-text strong { color: #fff; font-weight: 800; }
.bullets-list { display: flex; flex-direction: column; gap: 10px; }
.bullet-row   { display: flex; align-items: flex-start; gap: 10px; }
.bullet-check {
  width: 20px; height: 20px; border-radius: 50%; background: rgba(32,180,85,.15);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
}

/* ── Chosen block ──────────────────────────────────────────────── */
.chosen-block {
  border-radius: 16px; padding: 16px 18px;
  background: linear-gradient(135deg, #082B49, #0d4c7a);
  border: 1px solid rgba(216,166,58,.35);
  text-align: center;
}
.chosen-crown { font-size: 1.6rem; margin-bottom: 6px; }
.chosen-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
.chosen-text  { font-size: 13px; color: rgba(255,255,255,.82); line-height: 1.65; }

/* ── Product main card ─────────────────────────────────────────── */
.product-main-card {
  border: 2px solid var(--gold);
  border-radius: 20px; overflow: hidden;
  background: #fff;
  box-shadow: 0 8px 32px rgba(216,166,58,.18);
}
.product-main-header {
  background: linear-gradient(135deg, #082B49, #0d4c7a);
  padding: 14px 16px 10px;
  text-align: center;
}
.product-main-tag {
  display: inline-block; font-size: 10px; font-weight: 900; text-transform: uppercase;
  letter-spacing: .12em; color: var(--navy); background: var(--gold);
  border-radius: 999px; padding: 3px 12px; margin-bottom: 8px;
}
.product-main-title {
  font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700;
  color: #fff; line-height: 1.2;
}
.product-main-sub { font-size: 12px; color: rgba(255,255,255,.65); margin-top: 4px; }
.product-main-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
.product-bullet { display: flex; align-items: flex-start; gap: 8px; }
.product-bullet-check {
  width: 18px; height: 18px; border-radius: 50%; background: rgba(32,180,85,.15);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
}
.product-bullet-check svg { width: 9px; height: 7px; }
.product-bullet span { font-size: 13px; color: rgba(8,43,73,.8); line-height: 1.5; }
.product-main-footer {
  border-top: 1px solid var(--blue-border);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.product-value-old { font-size: 13px; color: rgba(8,43,73,.35); text-decoration: line-through; font-weight: 700; }
.product-included   { font-size: 13px; font-weight: 900; color: var(--green-cta); }

/* ── Bonus section ─────────────────────────────────────────────── */
.bonus-section-title {
  text-align: center; font-size: 11px; font-weight: 900; text-transform: uppercase;
  letter-spacing: .12em; color: rgba(8,43,73,.5); padding: 4px 0;
  display: flex; align-items: center; gap: 10px;
}
.bonus-section-title::before, .bonus-section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--blue-border);
}
.bonus-card {
  border: 1px solid var(--blue-border); border-radius: 16px; overflow: hidden;
  background: #fff; display: flex; flex-direction: column; transition: box-shadow .2s;
}
.bonus-card:hover { box-shadow: 0 6px 24px rgba(22,159,234,.15); }
.bonus-card-img {
  width: 100%; aspect-ratio: 1/1;
  overflow: hidden; flex-shrink: 0;
}
.bonus-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.bonus-card-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 5px; }
.bonus-card-num  { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: .1em; color: var(--blue-cta); }
.bonus-card-title{ font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 700; color: var(--navy); line-height: 1.2; }
.bonus-card-sub  { font-size: 12px; color: rgba(8,43,73,.58); line-height: 1.5; }
.bonus-card-price{ display: flex; align-items: center; gap: 8px; margin-top: 2px; }
.bonus-old-price { font-size: 12px; font-weight: 700; color: rgba(8,43,73,.32); text-decoration: line-through; }
.bonus-free-badge{
  font-size: 11px; font-weight: 900; color: #fff;
  background: linear-gradient(135deg, #20B455, #169A47);

   ════════════════════════════════════════════════ */
let loadTimer = null;
function startLoading() {
  if (loadTimer) clearInterval(loadTimer);
  let prog = 0;
  const DURATION = 5500, TICK = 50;
  const inc = 100 / (DURATION / TICK);
  loadTimer = setInterval(() => {
    prog = Math.min(prog + inc, 100);
    const pctEl = document.getElementById('load-pct');
    const fillEl = document.getElementById('load-fill');
    const phraseEl = document.getElementById('load-phrase');
    if (!pctEl) { clearInterval(loadTimer); return; }
    pctEl.textContent = Math.round(prog) + '%';
    fillEl.style.width = prog + '%';
    const idx = [...LOADING_PHRASES].reverse().findIndex(p => prog >= p.pct);
    const phrase = LOADING_PHRASES[LOADING_PHRASES.length - 1 - (idx >= 0 ? idx : LOADING_PHRASES.length-1)];
    if (phraseEl && phrase) phraseEl.textContent = phrase.text;
    if (prog >= 100) { clearInterval(loadTimer); setTimeout(next, 900); }
  }, TICK);
}

/* ════════════════════════════════════════════════
   CHECKOUT
   ════════════════════════════════════════════════ */
function checkout(e, el) {
  if (e) e.preventDefault();

  // 1. Dispara InitiateCheckout para o Meta Pixel
  if (typeof fbq !== 'undefined') fbq('track', 'InitiateCheckout');

  // 2. Constrói URL do checkout preservando TODOS os parâmetros da página atual
  //    (utm_source, utm_campaign, fbclid, etc.) + dados do quiz por cima
  var checkoutUrl = new URL(CHECKOUT_URL);

  // Copia parâmetros da URL de entrada (anúncio → LP)
  new URLSearchParams(window.location.search).forEach(function(value, key) {
    checkoutUrl.searchParams.set(key, value);
  });

  // Lê também de cookies e localStorage como fallback
  var utmKeys = ['utm_source','utm_medium','utm_campaign','utm_term','utm_content','fbclid','sck','xcod'];
  document.cookie.split(';').forEach(function(c) {
    var p = c.trim().split('='); var k = p[0]; var v = p.slice(1).join('=');
    if (utmKeys.indexOf(k) !== -1 && v && !checkoutUrl.searchParams.has(k))
      checkoutUrl.searchParams.set(k, decodeURIComponent(v));
  });
  utmKeys.forEach(function(k) {
    try {
      var v = localStorage.getItem(k) || localStorage.getItem('utmify_' + k);
      if (v && !checkoutUrl.searchParams.has(k)) checkoutUrl.searchParams.set(k, v);
    } catch(err) {}
  });

  // Dados do quiz (sobrescrevem se houver conflito)
  checkoutUrl.searchParams.set('name', S.nome);
  checkoutUrl.searchParams.set('area', S.areaOracao);
  checkoutUrl.searchParams.set('peso', S.peso);
  checkoutUrl.searchParams.set('urgencia', S.urgencia);
  checkoutUrl.searchParams.set('fe', S.fe);
  checkoutUrl.searchParams.set('src', 'quiz-oracao');

  var url = checkoutUrl.toString();

  // 3. Atualiza href para UTMify detectar o destino
  if (el) el.href = url;

  // 4. Aguarda 200ms para pixels dispararem antes do redirect
  setTimeout(function(){ window.location.href = url; }, 200);
}
